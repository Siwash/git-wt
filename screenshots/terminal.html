<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; }
  .terminal {
    background: #1a1b26;
    border-radius: 10px;
    overflow: hidden;
    font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    display: inline-block;
    min-width: 680px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .titlebar {
    background: #24283b;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #f7768e; }
  .dot-yellow { background: #e0af68; }
  .dot-green { background: #9ece6a; }
  .titlebar-text {
    color: #565f89;
    font-size: 12px;
    margin-left: 8px;
    flex: 1;
    text-align: center;
  }
  .content {
    padding: 20px 24px;
    color: #a9b1d6;
    white-space: pre;
  }
  .prompt { color: #9ece6a; }
  .cmd { color: #c0caf5; font-weight: bold; }
  .dim { color: #565f89; }
  .cyan { color: #7dcfff; }
  .green { color: #9ece6a; }
  .yellow { color: #e0af68; }
  .magenta { color: #bb9af7; }
  .red { color: #f7768e; }
  .blue { color: #7aa2f7; }
  .white { color: #c0caf5; }
  .bold { font-weight: bold; }
  .bar { color: #3b4261; }
  .selected { color: #9ece6a; }
  .checkbox { color: #7dcfff; }
  .radio { color: #bb9af7; }
</style>
</head>
<body>
</body>
</html>
